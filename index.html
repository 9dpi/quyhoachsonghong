<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DULIEUQUYHOACH.COM | Hệ thống Tra cứu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #2563eb;
            --sidebar-width: 340px;
            --detail-width: 450px;
            --bg-light: #f8fafc;
            --sidebar-bg: #ffffff;
            --border: rgba(0, 0, 0, 0.05);
            --text-main: #0f172a;
            --text-sub: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { background: #ffffff; border-bottom: 1px solid #e2e8f0; height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 5000; }
        .logo { font-family: 'Outfit'; font-size: 1.3rem; font-weight: 800; color: var(--primary); }
        .header-center { flex-grow: 1; max-width: 50%; margin: 0 40px; overflow: hidden; background: #f1f5f9; border-radius: 99px; padding: 6px 0; min-height: 35px; display: flex; align-items: center; }
        .ticker-content { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 30s linear infinite; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #1e40af; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .app-container { display: flex; flex-grow: 1; overflow: hidden; position: relative; }
        #sidebar { width: var(--sidebar-width); height: 100%; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; }
        #projectList { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .project-item { background: #ffffff; padding: 12px; border-radius: 10px; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .project-item:hover { border-color: var(--primary); background: #f0f7ff; }

        #main-content { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; }

        #detail-panel {
            position: absolute; right: -var(--detail-width); top: 0; bottom: 0;
            width: var(--detail-width); background: white; z-index: 4000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: none; flex-direction: column;
        }
        #detail-panel.open { right: 0; display: flex; }
        
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid #f1f5f9; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        
        footer { background: #ffffff; border-top: 1px solid #e2e8f0; padding: 8px 24px; font-size: 0.75rem; color: #94a3b8; text-align: center; }

        /* Style cho nội dung Popup để dễ click */
        .popup-click-area { cursor: pointer; padding: 5px; }
        .popup-click-area h4 { color: var(--primary); margin-bottom: 5px; font-size: 1rem; }
        .popup-click-area p { font-size: 0.85rem; margin-bottom: 5px; color: #64748b; }
        .popup-click-area b { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:15px; font-weight: 600; color:var(--text-sub)">Cập nhật thông tin quy hoạch...</p>
    </div>

    <header>
        <div class="logo">DULIEUQUYHOACH.COM</div>
        <div class="header-center"><div id="ticker" class="ticker-content">Tin tức: Đang kết nối dữ liệu trực tuyến...</div></div>
        <div class="header-right"><ul style="display:flex; gap:15px; list-style:none; font-size:0.85rem; font-weight:700; color:var(--text-sub)"><li>TRANG CHỦ</li><li>LIÊN HỆ</li></ul></div>
    </header>

    <div class="app-container">
        <aside id="sidebar"><div id="projectList"></div></aside>
        <main id="main-content">
            <div id="map"></div>
            <div id="detail-panel">
                <div style="padding:25px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;">
                    <h2 id="detail-title" style="font-size:1.3rem">Chi tiết</h2>
                    <i class="fa-solid fa-xmark" style="cursor:pointer; font-size:1.5rem" onclick="closeDetail()"></i>
                </div>
                <div id="detail-body" style="padding:25px; overflow-y:auto; line-height:1.7"></div>
            </div>
        </main>
    </div>

    <footer><b>Miễn trừ trách nhiệm:</b> Dữ liệu tổng hợp mang tính chất tham khảo.</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/9dpi/quyhoachsonghong/main/data/database.json'; 
        let allData = [];

        const map = L.map('map', { zoomControl: false }).setView([21.05, 105.85], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        async function init() {
            try {
                const res = await fetch(DATA_URL + "?t=" + Date.now());
                allData = await res.json();
                renderData(allData);
                document.getElementById('loader').style.display = 'none';
            } catch (e) { 
                console.error("Lỗi tải dữ liệu:", e);
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderData(data) {
            const list = document.getElementById('projectList');
            const ticker = document.getElementById('ticker');
            list.innerHTML = '';
            
            const headlines = data.filter(i => i.isHeadline === "YES");
            ticker.innerText = (headlines.length > 0 ? headlines : data.slice(0, 5)).map(h => h.tenKhu).join("  |  ");
            ticker.onclick = () => openDetail(headlines[0] || data[0]);

            data.forEach((item, index) => {
                if(!item.viDo || !item.kinhDo) return;
                
                const marker = L.marker([item.viDo, item.kinhDo]).addTo(map);
                
                // Sử dụng HTML String cho Popup để tránh lỗi DOM
                const popupHTML = `
                    <div class="popup-click-area" onclick="openDetailByIndex(${index})">
                        <h4>${item.tenKhu}</h4>
                        <p>${item.moTa.substring(0, 80)}...</p>
                        <b>Bấm để xem chi tiết →</b>
                    </div>
                `;
                marker.bindPopup(popupHTML);

                const div = document.createElement('div');
                div.className = 'project-item';
                div.innerHTML = `<h4>${item.tenKhu}</h4><p>${item.moTa.substring(0, 60)}...</p>`;
                div.onclick = () => { map.flyTo([item.viDo, item.kinhDo], 15); marker.openPopup(); };
                list.appendChild(div);
            });
        }

        // Hàm hỗ trợ mở detail qua index để ổn định hơn
        window.openDetailByIndex = function(index) {
            openDetail(allData[index]);
        }

        function openDetail(item) {
            if(!item) return;
            document.getElementById('detail-title').innerText = item.tenKhu;
            document.getElementById('detail-body').innerHTML = `
                <p style="font-weight:600; color:var(--primary); margin-bottom:10px">${item.loai || 'Quy hoạch'} | ${item.dienTich || 'N/A'}</p>
                <div style="white-space: pre-wrap;">${item.moTa}</div>
                <br><small>Nguồn: <a href="${item.nguonTin}" target="_blank">Xem nguồn tin gốc</a></small>
            `;
            const panel = document.getElementById('detail-panel');
            panel.style.display = 'flex';
            setTimeout(() => panel.classList.add('open'), 10);
        }

        function closeDetail() {
            const panel = document.getElementById('detail-panel');
            panel.classList.remove('open');
            setTimeout(() => panel.style.display = 'none', 400);
        }

        init();
    </script>
</body>
</html>
