<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DULIEUQUYHOACH.COM | Tra cứu Quy hoạch</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #f59e0b;
            --sidebar-width: 340px;
            --detail-width: 450px;
            --bg-light: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --font-main: 'Be Vietnam Pro', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--bg-light); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

        header { background: #ffffff; border-bottom: 1px solid #e2e8f0; height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 5000; }
        .logo { font-size: 1.3rem; font-weight: 900; color: var(--primary); text-decoration: none; letter-spacing: -0.5px; }
        
        .header-center { flex-grow: 1; max-width: 40%; margin: 0 40px; overflow: hidden; background: #f1f5f9; border-radius: 99px; padding: 6px 0; }
        .ticker-content { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 40s linear infinite; font-size: 0.85rem; font-weight: 600; color: #1e40af; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .app-container { display: flex; flex-grow: 1; overflow: hidden; position: relative; }
        #sidebar { width: var(--sidebar-width); height: 100%; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 15px; }
        
        .primary-search-card {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            padding: 18px 15px; border-radius: 16px; margin-bottom: 20px;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.15);
            color: white;
        }
        /* Đã sửa font-size để không bị xuống dòng */
        .primary-search-card h2 { font-size: 0.88rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        
        .search-input-group { display: flex; background: white; border-radius: 10px; padding: 4px; gap: 4px; }
        .search-input-group input { flex-grow: 1; border: none; outline: none; padding: 8px 12px; font-size: 0.85rem; font-family: var(--font-main); color: var(--text-main); width: 100%; }
        .search-input-group button { background: var(--secondary); color: white; border: none; border-radius: 8px; width: 40px; height: 36px; cursor: pointer; transition: 0.2s; }

        #projectList { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .project-item { background: #ffffff; padding: 12px; border-radius: 12px; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .project-item:hover { border-color: var(--primary); background: #f8fafc; }
        .project-item h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; color: #1e293b; }
        .project-item p { font-size: 0.72rem; color: var(--text-sub); line-height: 1.4; }

        #main-content { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; }

        #custom-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); text-align: center; }
        #custom-modal.active { display: flex; }

        #detail-panel { position: absolute; right: -var(--detail-width); top: 0; bottom: 0; width: var(--detail-width); background: white; z-index: 4000; box-shadow: -15px 0 40px rgba(0,0,0,0.08); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); display: none; flex-direction: column; }
        #detail-panel.open { right: 0; display: flex; }
    </style>
</head>
<body>

    <div id="custom-modal">
        <div class="modal-content">
            <div style="font-size: 2.5rem; color: var(--primary); margin-bottom: 15px;"><i class="fa-solid fa-satellite-dish"></i></div>
            <div style="font-size: 1.1rem; font-weight: 800; margin-bottom: 10px;" id="modalTitle">Đang kiểm tra ranh giới</div>
            <div style="font-size: 0.9rem; color: #64748b; line-height: 1.6; margin-bottom: 25px;" id="modalText">Hệ thống đang đối soát dữ liệu...</div>
            <button style="background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: var(--font-main);" onclick="closeModal()">Đã hiểu</button>
        </div>
    </div>

    <header>
        <a href="#" class="logo">DULIEUQUYHOACH.COM</a>
        <div class="header-center"><div id="ticker" class="ticker-content">Tin tức: Đang tải dữ liệu quy hoạch sông Hồng...</div></div>
        <div class="header-right"><ul style="display:flex; gap:15px; list-style:none; font-size:0.85rem; font-weight:700"><li>FB</li><li>YT</li><li>TT</li></ul></div>
    </header>

    <div class="app-container">
        <aside id="sidebar">
            <div class="primary-search-card">
                <h2><i class="fa-solid fa-house-circle-exclamation"></i> Nhà tôi có trong diện quy hoạch?</h2>
                <div class="search-input-group">
                    <input type="text" id="addrInput" placeholder="Nhập địa chỉ nhà bạn..." onkeypress="if(event.key==='Enter') checkMyHome()">
                    <button onclick="checkMyHome()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
            <div style="font-weight:800; font-size:0.65rem; color:var(--text-sub); margin-bottom:10px; letter-spacing:1px; padding-left:5px">DANH SÁCH DỰ ÁN</div>
            <div id="projectList"></div>
        </aside>

        <main id="main-content">
            <div id="map"></div>
            <div id="detail-panel">
                <div style="padding:25px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;">
                    <h2 id="detail-title" style="font-size:1.2rem; font-weight:800">Chi tiết</h2>
                    <i class="fa-solid fa-xmark" style="cursor:pointer; font-size:1.3rem; color:#94a3b8" onclick="closeDetail()"></i>
                </div>
                <div id="detail-body" style="padding:25px; overflow-y:auto; line-height:1.7; font-size:0.9rem; color:#334155"></div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DATA_URL = 'https://raw.githubusercontent.com/9dpi/quyhoachsonghong/main/data/database.json'; 
        let allData = [];

        const map = L.map('map', { zoomControl: false }).setView([21.05, 105.85], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        async function init() {
            try {
                const res = await fetch(DATA_URL + "?t=" + Date.now());
                allData = await res.json();
                renderData(allData);
            } catch (e) { console.error(e); }
        }

        function renderData(data) {
            const list = document.getElementById('projectList');
            const ticker = document.getElementById('ticker');
            list.innerHTML = '';
            ticker.innerText = data.slice(0, 5).map(h => h.tenKhu).join("  |  ");

            data.forEach((item, index) => {
                if(!item.viDo || !item.kinhDo) return;
                const marker = L.marker([item.viDo, item.kinhDo]).addTo(map);
                marker.bindPopup(`<h4 style="font-family:'Be Vietnam Pro'">${item.tenKhu}</h4><a href="javascript:openDetailByIndex(${index})" style="font-family:'Be Vietnam Pro'; color:#2563eb; font-weight:700; text-decoration:none">Xem chi tiết →</a>`);

                const div = document.createElement('div');
                div.className = 'project-item';
                div.innerHTML = `<h4>${item.tenKhu}</h4><p>${item.moTa.substring(0, 60)}...</p>`;
                div.onclick = () => { map.flyTo([item.viDo, item.kinhDo], 15); marker.openPopup(); };
                list.appendChild(div);
            });
        }

        function checkMyHome() {
            const addr = document.getElementById('addrInput').value;
            if(!addr) return;
            document.getElementById('modalTitle').innerText = "Đang kiểm tra ranh giới";
            document.getElementById('modalText').innerHTML = `Hệ thống đang tiến hành đối soát địa chỉ: <br><b>${addr}</b><br>với bản đồ quy hoạch 1/5000 mới nhất.`;
            document.getElementById('custom-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('custom-modal').classList.remove('active'); }

        window.openDetailByIndex = (idx) => {
            const item = allData[idx];
            document.getElementById('detail-title').innerText = item.tenKhu;
            document.getElementById('detail-body').innerHTML = `
                <div style="background:#eff6ff; padding:12px; border-radius:10px; margin-bottom:15px; font-weight:700; color:#1e40af; font-size:0.8rem">
                    QUY MÔ: ${item.dienTich || 'N/A'} | LOẠI: ${item.loai || 'Quy hoạch'}
                </div>
                <div style="white-space: pre-wrap;">${item.moTa}</div>
                <br><hr style="border:0; border-top:1px solid #f1f5f9; margin:15px 0">
                <small>Nguồn tin: <a href="${item.nguonTin}" target="_blank" style="color:#2563eb">${item.nguonTin}</a></small>
            `;
            document.getElementById('detail-panel').style.display = 'flex';
            setTimeout(() => document.getElementById('detail-panel').classList.add('open'), 10);
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('open');
            setTimeout(() => document.getElementById('detail-panel').style.display = 'none', 400);
        }

        init();
    </script>
</body>
</html>
