name: Update Static Cache

on:
  schedule:
    - cron: '0 2,9,16 * * *' # Chạy 3 lần/ngày: 2h, 9h, 16h (UTC) = 9h, 16h, 23h (GMT+7)
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and validate data from GAS API
        run: |
          mkdir -p data
          # Tải về file tạm
          HTTP_STATUS=$(curl -L -s -o /tmp/sheet_data_new.json -w "%{http_code}" \
            "https://script.google.com/macros/s/AKfycbxx6eSTIaCJwrtwQYh7rBruih2QWUiA34LDsi1hfjqeIVvIcPRFl-dtHMdAwwwwrCLe9A/exec")
          
          echo "HTTP Status: $HTTP_STATUS"
          
          # Kiểm tra HTTP status và JSON hợp lệ
          if [ "$HTTP_STATUS" = "200" ]; then
            # Kiểm tra có phải JSON hợp lệ không (có trường "news")
            if python3 -c "import json; data = json.load(open('/tmp/sheet_data_new.json', encoding='utf-8')); assert 'news' in data, 'Missing news key'; assert len(data['news']) > 0, 'Empty news array'; assert 'tenKhu' in data['news'][0], 'Missing tenKhu field - invalid structure'; print(f'Valid JSON: {len(data[\"news\"])} news items, {len(data.get(\"faq\",[]))} FAQs')"; then
              cp /tmp/sheet_data_new.json data/sheet_data.json
              echo "sheet_data.json updated successfully."
            else
              echo "WARNING: GAS API returned invalid JSON structure. Keeping existing file."
            fi
          else
            echo "WARNING: GAS API returned HTTP $HTTP_STATUS. Keeping existing file."
          fi

      - name: 📅 Run Official Documents Scraper & Update
        run: |
          python3 tools/document_updater.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/sheet_data.json data/official_documents.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update static cache & documents [skip ci]" && git push)
