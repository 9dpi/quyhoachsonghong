name: Update Static Cache

on:
  schedule:
    - cron: '0 * * * *' # Chạy mỗi giờ
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch data from GAS API
        run: |
          mkdir -p data
          curl -L "https://script.google.com/macros/s/AKfycbxx6eSTIaCJwrtwQYh7rBruih2QWUiA34LDsi1hfjqeIVvIcPRFl-dtHMdAwwwwrCLe9A/exec" -o data/sheet_data.json

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/sheet_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update static cache [skip ci]" && git push)
