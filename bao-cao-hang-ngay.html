<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo Hệ thống Hàng ngày | DuLieuQuyHoach.com</title>
    <meta name="description" content="Dashboard theo dõi tình trạng và chất lượng dữ liệu quy hoạch Hà Nội tự động hàng ngày.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #080c14;
            --bg2:      #0e1420;
            --bg3:      #141c2c;
            --card:     #111827;
            --border:   rgba(255,255,255,0.06);
            --text:     #e2e8f0;
            --muted:    #94a3b8;
            --sub:      #64748b;
            --ok:       #10b981;
            --info:     #3b82f6;
            --warn:     #f59e0b;
            --crit:     #ef4444;
            --purple:   #8b5cf6;
            --ok-bg:    rgba(16,185,129,.08);
            --info-bg:  rgba(59,130,246,.08);
            --warn-bg:  rgba(245,158,11,.08);
            --crit-bg:  rgba(239,68,68,.08);
            --ok-bdr:   rgba(16,185,129,.25);
            --info-bdr: rgba(59,130,246,.25);
            --warn-bdr: rgba(245,158,11,.25);
            --crit-bdr: rgba(239,68,68,.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── TOP HEADER ─────────────────────────────────────────── */
        .top-bar {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-logo {
            display: flex; align-items: center; gap: 9px;
            font-size: .9rem; font-weight: 800;
            text-decoration: none; color: var(--text);
        }

        .logo-box {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: .9rem; color: #fff;
        }

        .top-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .62rem; font-weight: 700;
            letter-spacing: .07em; text-transform: uppercase;
        }

        .badge-daily {
            background: rgba(245,158,11,.12);
            color: var(--warn);
            border: 1px solid rgba(245,158,11,.3);
        }

        .top-spacer { flex: 1; }

        .last-run {
            font-size: .7rem; color: var(--sub);
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-refresh {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 8px; border: none;
            background: rgba(99,102,241,.15);
            color: #a5b4fc;
            font-size: .73rem; font-weight: 700; cursor: pointer;
            transition: all .2s;
            text-decoration: none;
        }
        .btn-refresh:hover { background: rgba(99,102,241,.25); }

        /* ─── LAYOUT ─────────────────────────────────────────────── */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 28px 60px;
        }

        /* ─── OVERALL STATUS BANNER ──────────────────────────────── */
        .status-banner {
            border-radius: 16px;
            padding: 24px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            border: 1px solid;
        }

        .banner-icon {
            font-size: 2.4rem;
            flex-shrink: 0;
        }

        .banner-title {
            font-size: 1.35rem;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .banner-sub {
            font-size: .78rem;
            opacity: .8;
        }

        .banner-meta {
            margin-left: auto;
            text-align: right;
            font-size: .7rem;
            opacity: .75;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── KPI GRID ───────────────────────────────────────────── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .kpi-grid { grid-template-columns: 1fr; } }

        .kpi-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            transition: transform .2s, box-shadow .2s;
        }
        .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }

        .kpi-icon {
            font-size: .9rem;
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }

        .kpi-value {
            font-size: 1.6rem;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 2px;
        }

        .kpi-label {
            font-size: .68rem;
            font-weight: 600;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .kpi-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 0 0 14px 14px;
        }

        /* ─── CHECKS GRID ────────────────────────────────────────── */
        .checks-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) { .checks-grid { grid-template-columns: 1fr; } }

        .check-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .check-header {
            padding: 16px 20px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .check-icon-wrap {
            width: 32px; height: 32px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: .85rem; flex-shrink: 0;
        }

        .check-title {
            font-size: .85rem;
            font-weight: 800;
            flex: 1;
        }

        .status-pill {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .6rem;
            font-weight: 800;
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .check-body { padding: 16px 20px; }

        .check-summary {
            font-size: .75rem;
            color: var(--muted);
            margin-bottom: 12px;
            line-height: 1.55;
        }

        /* ─── TABLE ──────────────────────────────────────────────── */
        .mini-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .7rem;
        }

        .mini-table th {
            text-align: left;
            font-size: .6rem;
            font-weight: 700;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: .05em;
            padding: 0 0 8px;
            border-bottom: 1px solid var(--border);
        }

        .mini-table td {
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,.03);
            color: var(--muted);
            vertical-align: middle;
        }

        .mini-table tr:last-child td { border-bottom: none; }

        .mono { font-family: 'JetBrains Mono', monospace; font-size: .67rem; }

        /* ─── CHECK ITEMS ────────────────────────────────────────── */
        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,.03);
            font-size: .73rem;
        }
        .check-item:last-child { border-bottom: none; }

        .ci-icon { font-size: .8rem; flex-shrink: 0; margin-top: 1px; }
        .ci-label { flex: 1; color: var(--text); font-weight: 600; }
        .ci-detail { color: var(--sub); font-size: .67rem; }

        /* ─── STATUS COLORS ──────────────────────────────────────── */
        .ok    { color: var(--ok); }
        .info  { color: var(--info); }
        .warn  { color: var(--warn); }
        .crit  { color: var(--crit); }
        .purple { color: var(--purple); }

        .pill-ok   { background: var(--ok-bg);   color: var(--ok);   border: 1px solid var(--ok-bdr); }
        .pill-info { background: var(--info-bg);  color: var(--info); border: 1px solid var(--info-bdr); }
        .pill-warn { background: var(--warn-bg);  color: var(--warn); border: 1px solid var(--warn-bdr); }
        .pill-crit { background: var(--crit-bg);  color: var(--crit); border: 1px solid var(--crit-bdr); }

        .bg-ok   { background: var(--ok-bg);   border-color: var(--ok-bdr);   color: var(--ok); }
        .bg-info { background: var(--info-bg);  border-color: var(--info-bdr); color: var(--info); }
        .bg-warn { background: var(--warn-bg);  border-color: var(--warn-bdr); color: var(--warn); }
        .bg-crit { background: var(--crit-bg);  border-color: var(--crit-bdr); color: var(--crit); }

        .bar-ok   { background: linear-gradient(90deg, var(--ok), #059669); }
        .bar-info { background: linear-gradient(90deg, var(--info), #2563eb); }
        .bar-warn { background: linear-gradient(90deg, var(--warn), #d97706); }
        .bar-crit { background: linear-gradient(90deg, var(--crit), #dc2626); }

        .icon-ok   { background: rgba(16,185,129,.15); color: var(--ok); }
        .icon-info { background: rgba(59,130,246,.15);  color: var(--info); }
        .icon-warn { background: rgba(245,158,11,.15);  color: var(--warn); }
        .icon-crit { background: rgba(239,68,68,.15);   color: var(--crit); }

        /* ─── LINK BADGE ─────────────────────────────────────────── */
        .link-tag {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem;
            padding: 1px 6px;
            border-radius: 5px;
            font-weight: 600;
        }

        /* ─── LOADING STATE ──────────────────────────────────────── */
        .loading-shimmer {
            background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
            height: 16px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* ─── SCROLLBAR ──────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

        /* ─── FOOTER ─────────────────────────────────────────────── */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: .7rem;
            color: var(--sub);
            padding: 20px 0;
            border-top: 1px solid var(--border);
        }

        /* ─── PULSE DOT ──────────────────────────────────────────── */
        .pulse-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: .5; transform: scale(.8); }
        }
    </style>
    <!-- Security Gate: Passcode Protection -->
    <script>
    (function() {
        const PASSCODE = '9899';
        const STORAGE_KEY = 'security_passcode_verified';

        if (sessionStorage.getItem(STORAGE_KEY) === 'true') {
            return;
        }

        // Lock page immediately before body renders
        document.documentElement.classList.add('page-locked');
        
        // Inject lock screen styles
        const style = document.createElement('style');
        style.innerHTML = `
            html.page-locked body {
                overflow: hidden !important;
                height: 100vh !important;
            }
            html.page-locked body > *:not(#passcode-gate) {
                display: none !important;
            }
            #passcode-gate {
                position: fixed;
                inset: 0;
                z-index: 9999999;
                background: radial-gradient(circle at center, #0b0f19 0%, #030712 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Inter', sans-serif;
                color: #f8fafc;
            }
            .lock-card {
                background: rgba(17, 24, 39, 0.7);
                border: 1px solid rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border-radius: 24px;
                padding: 40px 32px;
                width: 380px;
                max-width: 90vw;
                text-align: center;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 50px rgba(99, 102, 241, 0.15);
                transform: translateY(0);
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .lock-icon-wrap {
                width: 64px;
                height: 64px;
                background: rgba(99, 102, 241, 0.1);
                border: 1px solid rgba(99, 102, 241, 0.25);
                color: #818cf8;
                font-size: 1.6rem;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 20px;
                box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
            }
            .lock-card h2 {
                font-size: 1.25rem;
                font-weight: 800;
                margin-bottom: 8px;
                color: #f8fafc;
                letter-spacing: -0.02em;
            }
            .lock-card p {
                font-size: 0.76rem;
                color: #94a3b8;
                line-height: 1.5;
                margin-bottom: 28px;
            }
            .pin-display {
                display: flex;
                justify-content: center;
                gap: 16px;
                margin-bottom: 32px;
            }
            .pin-dot {
                width: 14px;
                height: 14px;
                border: 2px solid rgba(148, 163, 184, 0.3);
                border-radius: 50%;
                transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .pin-dot.active {
                background: #6366f1;
                border-color: #6366f1;
                box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
                transform: scale(1.15);
            }
            .numpad {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
                max-width: 280px;
                margin: 0 auto;
            }
            .numpad button {
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid rgba(255, 255, 255, 0.04);
                color: #e2e8f0;
                font-size: 1.25rem;
                font-weight: 600;
                height: 56px;
                width: 56px;
                border-radius: 50%;
                cursor: pointer;
                transition: all 0.12s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto;
                outline: none;
                user-select: none;
            }
            .numpad button:hover {
                background: rgba(255, 255, 255, 0.07);
                border-color: rgba(255, 255, 255, 0.15);
                color: #ffffff;
            }
            .numpad button:active {
                background: rgba(99, 102, 241, 0.2);
                border-color: rgba(99, 102, 241, 0.4);
                color: #a5b4fc;
                transform: scale(0.92);
            }
            .numpad button.btn-clear {
                color: #f43f5e;
                font-size: 1.05rem;
                background: rgba(244, 63, 94, 0.03);
                border-color: rgba(244, 63, 94, 0.08);
            }
            .numpad button.btn-clear:hover {
                background: rgba(244, 63, 94, 0.1);
                border-color: rgba(244, 63, 94, 0.25);
            }
            .numpad button.btn-ok {
                color: #10b981;
                font-size: 1.15rem;
                background: rgba(16, 185, 129, 0.03);
                border-color: rgba(16, 185, 129, 0.08);
            }
            .numpad button.btn-ok:hover {
                background: rgba(16, 185, 129, 0.1);
                border-color: rgba(16, 185, 129, 0.25);
            }
            .lock-error {
                height: 18px;
                margin-top: 20px;
                font-size: 0.72rem;
                font-weight: 600;
                color: #f43f5e;
                opacity: 0;
                transition: opacity 0.2s;
            }
            .lock-error.show {
                opacity: 1;
            }
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%, 60% { transform: translateX(-6px); }
                40%, 80% { transform: translateX(6px); }
            }
            .lock-card.shake {
                animation: shake 0.4s ease-in-out;
                border-color: rgba(244, 63, 94, 0.35);
                box-shadow: 0 0 40px rgba(244, 63, 94, 0.15);
            }
        `;
        document.head.appendChild(style);

        // Lock Screen HTML Injection
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem(STORAGE_KEY) === 'true') {
                document.documentElement.classList.remove('page-locked');
                return;
            }

            const gate = document.createElement('div');
            gate.id = 'passcode-gate';
            gate.innerHTML = `
                <div class="lock-card" id="lock-card">
                    <div class="lock-icon-wrap">
                        <i class="fa-solid fa-lock-keyhole"></i>
                    </div>
                    <h2>Xác thực Quyền truy cập</h2>
                    <p>Đây là phân hệ nội bộ của DuLieuQuyHoach.com.<br>Vui lòng nhập passcode để tiếp tục.</p>
                    <div class="pin-display">
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                    </div>
                    <div class="numpad">
                        <button data-val="1">1</button>
                        <button data-val="2">2</button>
                        <button data-val="3">3</button>
                        <button data-val="4">4</button>
                        <button data-val="5">5</button>
                        <button data-val="6">6</button>
                        <button data-val="7">7</button>
                        <button data-val="8">8</button>
                        <button data-val="9">9</button>
                        <button class="btn-clear" id="btn-clear" title="Xóa"><i class="fa-solid fa-delete-left"></i></button>
                        <button data-val="0">0</button>
                        <button class="btn-ok" id="btn-ok" title="Xác nhận"><i class="fa-solid fa-circle-check"></i></button>
                    </div>
                    <div id="lock-error" class="lock-error"></div>
                </div>
            `;
            document.body.appendChild(gate);

            let pin = '';
            const dots = gate.querySelectorAll('.pin-dot');
            const card = gate.querySelector('#lock-card');
            const errorEl = gate.querySelector('#lock-error');

            function updateDots() {
                dots.forEach((dot, idx) => {
                    if (idx < pin.length) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
            }

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.classList.add('show');
                card.classList.add('shake');
                setTimeout(() => {
                    card.classList.remove('shake');
                }, 400);
            }

            function clearError() {
                errorEl.classList.remove('show');
            }

            function handleInput(char) {
                if (pin.length >= 4) return;
                clearError();
                pin += char;
                updateDots();
                if (pin.length === 4) {
                    setTimeout(submitPin, 150);
                }
            }

            function deleteChar() {
                if (pin.length === 0) return;
                clearError();
                pin = pin.slice(0, -1);
                updateDots();
            }

            function submitPin() {
                if (pin === PASSCODE) {
                    sessionStorage.setItem(STORAGE_KEY, 'true');
                    gate.style.transition = 'opacity 0.25s ease';
                    gate.style.opacity = '0';
                    setTimeout(() => {
                        gate.remove();
                        document.documentElement.classList.remove('page-locked');
                    }, 250);
                } else {
                    showError('Mã passcode không chính xác!');
                    pin = '';
                    setTimeout(updateDots, 300);
                }
            }

            // Click listeners for numpad
            gate.querySelectorAll('.numpad button[data-val]').forEach(btn => {
                btn.addEventListener('click', () => {
                    handleInput(btn.getAttribute('data-val'));
                });
            });

            gate.querySelector('#btn-clear').addEventListener('click', deleteChar);
            gate.querySelector('#btn-ok').addEventListener('click', submitPin);

            // Keyboard support
            const keydownHandler = (e) => {
                if (!document.documentElement.classList.contains('page-locked')) {
                    document.removeEventListener('keydown', keydownHandler);
                    return;
                }
                if (e.key >= '0' && e.key <= '9') {
                    handleInput(e.key);
                } else if (e.key === 'Backspace') {
                    deleteChar();
                } else if (e.key === 'Enter') {
                    submitPin();
                }
            };
            document.addEventListener('keydown', keydownHandler);
        });
    })();
    </script>
</head>
<body>

<!-- TOP BAR -->
<nav class="top-bar">
    <a href="index.html" class="top-logo">
        <div class="logo-box"><i class="fa-solid fa-chart-mixed"></i></div>
        <span>Dashboard Kiểm tra</span>
    </a>
    <span class="top-badge badge-daily">Hàng ngày</span>
    <div class="top-spacer"></div>
    <span class="last-run" id="last-run-time">Đang tải...</span>
    <a href="data/daily_report.md" target="_blank" class="btn-refresh">
        <i class="fa-solid fa-file-lines"></i> Xem Markdown
    </a>
    <button class="btn-refresh" onclick="loadReport()">
        <i class="fa-solid fa-rotate"></i> Làm mới
    </button>
</nav>

<div class="container">

    <!-- STATUS BANNER -->
    <div class="status-banner" id="status-banner" style="background:var(--warn-bg);border-color:var(--warn-bdr);">
        <div class="banner-icon" id="banner-icon">⏳</div>
        <div>
            <div class="banner-title" id="banner-title">Đang tải dữ liệu báo cáo...</div>
            <div class="banner-sub" id="banner-sub">Vui lòng đợi trong giây lát.</div>
        </div>
        <div class="banner-meta" id="banner-meta">—</div>
    </div>

    <!-- KPI STRIP -->
    <div class="kpi-grid" id="kpi-grid">
        <!-- Filled by JS -->
        <div class="kpi-card"><div class="loading-shimmer" style="height:80px;"></div></div>
        <div class="kpi-card"><div class="loading-shimmer" style="height:80px;"></div></div>
        <div class="kpi-card"><div class="loading-shimmer" style="height:80px;"></div></div>
        <div class="kpi-card"><div class="loading-shimmer" style="height:80px;"></div></div>
    </div>

    <!-- CHECKS GRID -->
    <div class="checks-grid" id="checks-grid">
        <!-- Filled by JS -->
    </div>

</div>

<footer class="footer">
    <span class="pulse-dot" style="background:var(--ok);box-shadow:0 0 6px var(--ok);"></span>
    Công cụ kiểm tra tự động — DuLieuQuyHoach.com &nbsp;|&nbsp;
    Chạy bởi <code>tools/daily_checker.py</code> &amp; GitHub Actions
    &nbsp;|&nbsp; Báo cáo ngày <span id="footer-date">—</span>
</footer>

<script>
// ================================================================
//  Dashboard Logic
// ================================================================

const STATUS_META = {
    ok:       { icon: '✅', label: 'HOẠT ĐỘNG TỐT', color: 'ok',   emoji: '🟢' },
    info:     { icon: 'ℹ️', label: 'CÓ THÔNG BÁO',  color: 'info', emoji: '🔵' },
    warning:  { icon: '⚠️', label: 'CÓ CẢNH BÁO',   color: 'warn', emoji: '🟡' },
    critical: { icon: '🚨', label: 'CẦN XỬ LÝ NGAY', color: 'crit', emoji: '🔴' },
};

const CHECK_ICONS = {
    'GIS Integrity':         'fa-satellite-dish',
    'Data Freshness':        'fa-clock',
    'Link Health':           'fa-link',
    'Data Quality':          'fa-database',
    'Market Prices':         'fa-chart-line',
    'Official Documents':    'fa-file-contract',
    'Q&A Coverage':          'fa-circle-question',
    'Map Polygons':          'fa-draw-polygon',
};

function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pillClass(status) {
    const m = { ok:'pill-ok', info:'pill-info', warning:'pill-warn', critical:'pill-crit' };
    return m[status] || 'pill-info';
}

function iconClass(status) {
    const m = { ok:'icon-ok', info:'icon-info', warning:'icon-warn', critical:'icon-crit' };
    return m[status] || 'icon-info';
}

function statusLabel(s) {
    const m = { ok:'ĐẠT', info:'THÔNG TIN', warning:'CẢNH BÁO', critical:'NGHIÊM TRỌNG' };
    return m[s] || s.toUpperCase();
}

// ─── BANNER ─────────────────────────────────────────────────────
function renderBanner(report) {
    const meta = STATUS_META[report.overall_status] || STATUS_META.info;
    const banner = document.getElementById('status-banner');
    const clsMap = { ok:'bg-ok', info:'bg-info', warning:'bg-warn', critical:'bg-crit' };
    banner.className = 'status-banner ' + (clsMap[report.overall_status] || 'bg-warn');

    document.getElementById('banner-icon').textContent  = meta.emoji;
    document.getElementById('banner-title').textContent = `Trạng thái hệ thống: ${meta.label}`;
    document.getElementById('banner-sub').textContent   =
        `${report.total_checks} hạng mục kiểm tra đã hoàn tất. Nhấn "Làm mới" để tải báo cáo mới nhất.`;
    document.getElementById('banner-meta').innerHTML =
        `<div>Thời gian chạy</div><div><b>${esc(report.generated_at)}</b></div>`;
    document.getElementById('last-run-time').textContent = `Cập nhật: ${report.generated_at}`;
    document.getElementById('footer-date').textContent   = report.date;
}

// ─── KPI GRID ────────────────────────────────────────────────────
function renderKPIs(report) {
    const checks = report.checks;
    const gis      = checks.find(c => c.name === 'GIS Integrity');
    const prices   = checks.find(c => c.name === 'Market Prices');
    const quality  = checks.find(c => c.name === 'Data Quality');
    const links    = checks.find(c => c.name === 'Link Health');

    const passCount    = checks.filter(c => c.status === 'ok').length;
    const warnCount    = checks.filter(c => c.status === 'warning').length;
    const critCount    = checks.filter(c => c.status === 'critical').length;
    const gisPass      = gis ? gis.pass : '?';
    const gisTotal     = gis ? (gis.pass + gis.fail) : '?';
    const listings     = prices ? (prices.listing_count ?? '?') : '?';
    const records      = quality ? (quality.total_records ?? '?') : '?';
    const linkFail     = links ? (links.fail_count ?? 0) : 0;

    const kpis = [
        {
            label: 'Hạng mục ĐẠT',
            value: `${passCount}/${report.total_checks}`,
            icon: 'fa-shield-check',
            color: passCount === report.total_checks ? 'ok' : 'warn',
            bar: passCount === report.total_checks ? 'bar-ok' : 'bar-warn'
        },
        {
            label: 'GIS Test Cases',
            value: `${gisPass}/${gisTotal}`,
            icon: 'fa-satellite-dish',
            color: gis?.status === 'ok' ? 'ok' : 'crit',
            bar: gis?.status === 'ok' ? 'bar-ok' : 'bar-crit'
        },
        {
            label: 'Listings Giá đất',
            value: Number(listings).toLocaleString('vi-VN'),
            icon: 'fa-chart-line',
            color: prices?.status === 'ok' ? 'ok' : 'warn',
            bar: prices?.status === 'ok' ? 'bar-ok' : 'bar-warn'
        },
        {
            label: 'Link lỗi',
            value: linkFail,
            icon: 'fa-link-slash',
            color: linkFail === 0 ? 'ok' : 'crit',
            bar: linkFail === 0 ? 'bar-ok' : 'bar-crit'
        },
    ];

    document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
        <div class="kpi-card">
            <div class="kpi-icon icon-${k.color}">
                <i class="fa-solid ${esc(k.icon)}"></i>
            </div>
            <div class="kpi-value ${k.color}">${esc(k.value)}</div>
            <div class="kpi-label">${esc(k.label)}</div>
            <div class="kpi-bar ${k.bar}"></div>
        </div>
    `).join('');
}

// ─── CHECK CARDS ─────────────────────────────────────────────────
function renderChecks(report) {
    const grid = document.getElementById('checks-grid');
    grid.innerHTML = report.checks.map(c => renderCheckCard(c)).join('');
}

function renderCheckCard(c) {
    const icon = CHECK_ICONS[c.name] || 'fa-circle-check';
    const pClass = pillClass(c.status);
    const iClass = iconClass(c.status);

    let body = '';
    if (c.summary) {
        body += `<p class="check-summary">${esc(c.summary)}</p>`;
    }

    // GIS checks
    if (c.checks?.length) {
        body += c.checks.map(ch => `
            <div class="check-item">
                <span class="ci-icon">${ch.ok ? '✅' : '❌'}</span>
                <div>
                    <div class="ci-label">${esc(ch.label)}</div>
                    <div class="ci-detail">${esc(ch.detail)}</div>
                </div>
            </div>
        `).join('');
    }

    // Data freshness files
    if (c.files?.length) {
        body += `
        <table class="mini-table">
            <thead><tr>
                <th>File</th><th>Tuổi</th><th>Kích thước</th><th>Trạng thái</th>
            </tr></thead>
            <tbody>
            ${c.files.map(f => {
                const dot = {ok:'ok', info:'info', warning:'warn', critical:'crit', missing:'crit'}[f.status] || 'sub';
                return `<tr>
                    <td class="mono">${esc(f.file)}</td>
                    <td>${f.age_days != null ? f.age_days + ' ngày' : '—'}</td>
                    <td>${f.size_kb} KB</td>
                    <td><span class="${dot}">${f.status === 'ok' ? '✅' : (f.status === 'missing' ? '❌' : '⚠️')} ${esc(f.note.split('(')[0].trim())}</span></td>
                </tr>`;
            }).join('')}
            </tbody>
        </table>`;
    }

    // Link health
    if (c.links?.length) {
        body += `
        <table class="mini-table">
            <thead><tr><th>Nguồn</th><th>HTTP</th><th>Độ trễ</th></tr></thead>
            <tbody>
            ${c.links.map(l => {
                const codeClass = l.ok ? 'ok' : 'crit';
                const codeIcon  = l.ok ? '✅' : '❌';
                return `<tr>
                    <td>${codeIcon} ${esc(l.name)}</td>
                    <td><span class="link-tag ${l.ok ? 'pill-ok' : 'pill-crit'}">${l.status_code ?? 'ERR'}</span></td>
                    <td class="mono">${l.latency_ms != null ? l.latency_ms + 'ms' : '—'}</td>
                </tr>`;
            }).join('')}
            </tbody>
        </table>`;
    }

    // Quality issues
    if (c.issues?.length) {
        body += c.issues.map(issue => `
            <div class="check-item">
                <span class="ci-icon">${issue.type === 'critical' ? '🔴' : '⚠️'}</span>
                <span class="ci-label" style="color:var(--${issue.type === 'critical' ? 'crit' : 'warn'})">${esc(issue.msg)}</span>
            </div>
        `).join('');
    }

    // Document items
    if (c.items?.length) {
        body += c.items.map(item => `
            <div class="check-item">
                <span class="ci-icon">📄</span>
                <div>
                    <div class="ci-label">${esc(item.title)}</div>
                    <div class="ci-detail warn">${esc(item.note)}</div>
                </div>
            </div>
        `).join('');
    }

    // Market prices
    if (c.age_days !== undefined && c.listing_count !== undefined) {
        body += `
        <table class="mini-table">
            <thead><tr><th>Thuộc tính</th><th>Giá trị</th></tr></thead>
            <tbody>
                <tr><td>Số listings</td><td class="mono ok">${Number(c.listing_count).toLocaleString('vi-VN')}</td></tr>
                <tr><td>Tuổi file</td><td class="mono">${c.age_days} ngày</td></tr>
                <tr><td>Kích thước</td><td class="mono">${c.size_kb?.toLocaleString()} KB</td></tr>
            </tbody>
        </table>`;
    }

    // Map polygons
    if (c.polygons?.length) {
        body += `
        <table class="mini-table">
            <thead><tr><th>ID</th><th>Tên</th><th>Đỉnh</th><th></th></tr></thead>
            <tbody>
            ${c.polygons.map(p => `<tr>
                <td class="mono">${esc(p.id)}</td>
                <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.tenKhu)}</td>
                <td class="mono">${p.vertex_count}</td>
                <td>${p.status === 'ok' ? '✅' : '⚠️ ' + p.missing_fields.join(', ')}</td>
            </tr>`).join('')}
            </tbody>
        </table>`;
    }

    // Q&A
    if (c.question_count !== undefined) {
        body += `
        <table class="mini-table">
            <thead><tr><th>Hạng mục</th><th>Số lượng</th></tr></thead>
            <tbody>
                <tr><td>Tổng câu hỏi</td><td class="mono ok">${c.question_count}</td></tr>
                <tr><td>Có nguồn trích dẫn</td><td class="mono ok">${c.with_source}</td></tr>
                <tr><td>Chưa có nguồn</td><td class="mono ${c.without_source > 0 ? 'warn' : 'ok'}">${c.without_source}</td></tr>
            </tbody>
        </table>`;
    }

    if (!body) body = `<p class="check-summary">Không có chi tiết bổ sung.</p>`;

    return `
    <div class="check-card">
        <div class="check-header">
            <div class="check-icon-wrap ${iClass}">
                <i class="fa-solid ${esc(icon)}"></i>
            </div>
            <span class="check-title">${esc(c.name)}</span>
            <span class="status-pill ${pClass}">${statusLabel(c.status)}</span>
        </div>
        <div class="check-body">${body}</div>
    </div>`;
}

// ─── LOAD REPORT ─────────────────────────────────────────────────
async function loadReport() {
    try {
        const res = await fetch('data/daily_report.json?v=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const report = await res.json();

        renderBanner(report);
        renderKPIs(report);
        renderChecks(report);
    } catch (err) {
        // Fallback: hiển thị lỗi thân thiện
        document.getElementById('banner-title').textContent = 'Chưa tải được báo cáo';
        document.getElementById('banner-sub').textContent =
            'Hãy chạy: python tools/daily_checker.py để tạo báo cáo đầu tiên. Lỗi: ' + err.message;
        document.getElementById('checks-grid').innerHTML = `
            <div class="check-card" style="grid-column:1/-1">
                <div class="check-body">
                    <p class="check-summary">
                        <b class="crit">⚠️ Không tìm thấy file <code>data/daily_report.json</code></b><br><br>
                        Chạy lệnh sau để tạo báo cáo:
                    </p>
                    <pre style="background:var(--bg3);padding:12px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:#a5b4fc;margin-top:8px;">python tools/daily_checker.py</pre>
                    <p class="check-summary" style="margin-top:12px;">
                        Hoặc kích hoạt GitHub Actions workflow <code>daily_report.yml</code>.
                    </p>
                </div>
            </div>`;
    }
}

// ─── BOOT ────────────────────────────────────────────────────────
loadReport();
</script>
</body>
</html>
